sonar.projectKey=brainrot-frontend
sonar.profile=Sonar way
sonar.projectName=BrainRot Frontend
sonar.projectVersion=1.0
sonar.sources=src
sonar.test.inclusions=src/**/*.test.ts,src/**/*.test.tsx,src/**/*.spec.ts,src/**/*.spec.tsx
sonar.exclusions=**/node_modules/**, **/.next/**, **/coverage/**
sonar.sourceEncoding=UTF-8
sonar.host.url=http://localhost:9000
sonar.javascript.lcov.reportPaths=/usr/src/coverage/lcov.info
sonar.typescript.tsconfigPath=tsconfig.json
